<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نیو قاری ہوزری - بقایا مال فکس</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    body { margin: 0; background: #f4f7f6; font-family: system-ui; direction: rtl; }
    .header { background: #2c3e50; color: white; padding: 12px; text-align: center; }
    .tab-bar { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; font-size: 15px; }
    .active-tab { border-bottom: 4px solid #3498db; color: #3498db; }
    .container { padding: 10px; max-width: 650px; margin: auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 2px; }
    .btn-blue { background: #3498db; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e74c3c; color: white; }
    .btn-orange { background: #f39c12; color: white; }
    .btn-gray { background: #95a5a6; color: white; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
    .total-banner { background: #2ecc71; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 10px; font-weight: bold; }
    .summary-box { background: #eef2f3; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
    .balance-highlight { grid-column: span 2; background: #fff; padding: 10px; border-radius: 8px; border: 2px solid #e74c3c; color: #e74c3c; font-size: 18px; font-weight: bold; }
    table { width: 100%; text-align: right; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:1000; padding:10px; }
    
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; text-align: center; margin-bottom: 20px; }
      body { background: white !important; }
      .card { box-shadow: none !important; border: 1px solid #ccc !important; page-break-inside: avoid; }
      .modal { position: static !important; background: transparent !important; padding: 0 !important; }
      .modal > .card { border: none !important; width: 100% !important; max-width: 100% !important; }
      th, td { border: 1px solid #000; padding: 8px; text-align: center; }
      table { border: 1px solid #000; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = { apiKey: "AIzaSyCb7MQuMjkDuDGc0PXFK07xb8eN1_srbGU", authDomain: "farman-93e1d.firebaseapp.com", projectId: "farman-93e1d", storageBucket: "farman-93e1d.firebasestorage.app", messagingSenderId: "838060218283", appId: "1:838060218283:web:92df7394c10ea4212264ee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storeRef = db.collection('khataApp').doc('qaariHosieryData');

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('stock');
      const [suppliers, setSuppliers] = useState([]);
      const [stock, setStock] = useState([]);
      const [ledger, setLedger] = useState([]);
      const [stockHistory, setStockHistory] = useState([]); 
      const [viewingSup, setViewingSup] = useState(null);
      const [modal, setModal] = useState(null);

      useEffect(() => {
        firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          if(u) {
            storeRef.get().then(doc => {
              if (doc.exists) {
                const d = doc.data();
                setSuppliers(d.suppliers || []);
                setStock(d.stock || []);
                setLedger(d.ledger || []);
                setStockHistory(d.stockHistory || []);
              }
            });
          }
        });
      }, []);

      const sync = (newS, newSt, newL, newSH = stockHistory) => {
        setSuppliers(newS); setStock(newSt); setLedger(newL); setStockHistory(newSH);
        storeRef.set({ suppliers: newS, stock: newSt, ledger: newL, stockHistory: newSH });
      };

      const totalValue = stock.reduce((acc, s) => acc + (s.qty * (s.rate || 0)), 0);
      const handlePrint = () => { window.print(); };

      const deleteHistoryEntry = (h, item) => {
        if(confirm('کیا آپ واقعی یہ انٹری ڈیلیٹ کرنا چاہتے ہیں؟ اس سے متعلقہ اسٹاک اور سپلائر کا کھاتہ بھی واپس ہو جائے گا۔')) {
            let nStock = [...stock];
            let nLedger = [...ledger];
            if(h.type === 'in') {
                nStock = nStock.map(s => s.id === item.id ? {...s, qty: s.qty - h.qty} : s);
                if(h.ledgerId) nLedger = nLedger.filter(l => l.id !== h.ledgerId);
            } else {
                nStock = nStock.map(s => s.id === item.id ? {...s, qty: s.qty + h.qty, sold: (s.sold || 0) - h.qty} : s);
            }
            sync(suppliers, nStock, nLedger, stockHistory.filter(x => x.id !== h.id));
            setModal({type:'viewStockHistory', item: item}); 
        }
      };

      if (!user) return <div style={{textAlign:'center', padding:'50px'}}><button className="btn btn-blue" onClick={()=>firebase.auth().signInAnonymously()}>سسٹم کھولیں</button></div>;

      return (
        <div>
          <div className={modal ? "no-print" : ""}>
              <div className="print-only">
                 <h1 style={{margin:0, color:'#2c3e50'}}>نیو قاری ہوزری سٹور</h1>
                 <p style={{margin:'5px 0', fontSize:'14px'}}>نزد مبارک مسجد، بلاک اے، قائد اعظم مارکیٹ، فیصل آباد</p>
                 <p style={{margin:'0 0 10px 0', fontSize:'14px', fontWeight:'bold'}}>فون: 0306-5378112</p>
                 <hr style={{borderTop:'2px solid #2c3e50'}}/>
              </div>

              <div className="header no-print"><h2>نیو قاری ہوزری سٹور</h2></div>
              
              {!viewingSup ? (
                <>
                  <div className="tab-bar no-print">
                    <button className={`tab-btn ${activeTab==='stock'?'active-tab':''}`} onClick={()=>setActiveTab('stock')}>اسٹاک</button>
                    <button className={`tab-btn ${activeTab==='ledger'?'active-tab':''}`} onClick={()=>setActiveTab('ledger')}>کھاتہ</button>
                  </div>
                  <div className="container">
                    {activeTab === 'stock' && (
                      <div>
                        <div className="total-banner no-print">گودام مالیت: {totalValue.toLocaleString()} Rs</div>
                        <button className="btn btn-blue no-print" style={{width:'100%', padding:'10px', marginBottom:'10px'}} onClick={handlePrint}>🖨 اسٹاک رپورٹ پرنٹ کریں</button>
                        
                        <div className="card" style={{overflowX: 'auto'}}>
                          <h3 className="print-only" style={{marginTop:0}}>موجودہ اسٹاک رپورٹ</h3>
                          <table style={{minWidth: '100%'}}>
                            <thead>
                              <tr>
                                <th style={{textAlign: 'right'}}>آئٹم/سپلائر</th>
                                <th style={{textAlign: 'center'}}>کل آرڈر</th>
                                <th style={{textAlign: 'center'}}>موجود</th>
                                <th style={{textAlign: 'center'}}>بقایا مال</th>
                                <th className="no-print">ایکشن</th>
                              </tr>
                            </thead>
                            <tbody>
                              {stock.map(s => {
                                // نیا اور پکا فارمولا: وصول شدہ = موجودہ + بکا ہوا
                                const totalRec = s.qty + (s.sold || 0);
                                const remaining = (s.totalOrdered || 0) - totalRec;
                                
                                return (
                                <tr key={s.id}>
                                  <td style={{textAlign: 'right'}}><strong>{s.name}</strong><br/><small>{s.supplier}</small></td>
                                  <td style={{textAlign: 'center'}}>{s.totalOrdered || 0}</td>
                                  <td style={{textAlign: 'center'}}>{s.qty}<br/><small className="no-print" style={{color:'#666'}}>{s.rate} Rs</small></td>
                                  <td style={{textAlign: 'center', fontWeight: 'bold', color: remaining > 0 ? '#e74c3c' : '#2ecc71'}}>
                                    {remaining > 0 ? remaining : 0}
                                  </td>
                                  <td className="no-print" style={{textAlign: 'center'}}>
                                    <button className="btn btn-green" title="مال وصول کریں" onClick={()=>setModal({type:'stockAction', actionType:'in', item:s})}>+</button>
                                    <button className="btn btn-orange" title="مال بیچیں" onClick={()=>setModal({type:'stockAction', actionType:'out', item:s})}>-</button>
                                    <button className="btn btn-blue" title="ہسٹری/ریکارڈ" style={{padding:'4px'}} onClick={()=>setModal({type:'viewStockHistory', item:s})}>📋</button>
                                    <button className="btn btn-orange" title="ایڈٹ" style={{padding:'4px'}} onClick={()=>setModal({type:'editStock', data:s})}>✎</button>
                                    <button className="btn btn-red" title="ڈیلیٹ" style={{padding:'4px'}} onClick={()=>{ if(confirm('ڈیلیٹ؟')) sync(suppliers, stock.filter(x=>x.id!==s.id), ledger); }}>🗑</button>
                                  </td>
                                </tr>
                              )})}
                            </tbody>
                          </table>
                          <button className="btn btn-blue no-print" style={{width:'100%', marginTop:'15px'}} onClick={()=>setModal({type:'addStock'})}>+ نیا آئٹم شامل کریں</button>
                        </div>
                      </div>
                    )}
                    
                    {activeTab === 'ledger' && (
                      <div className="no-print">
                        <button className="btn btn-blue" style={{width:'100%', padding:'12px', marginBottom:'10px'}} onClick={()=>setModal({type:'addSup'})}>+ نیا سپلائر شامل کریں</button>
                        {suppliers.map(s => {
                          const bal = ledger.filter(l => l.supplierId === s.id).reduce((a,c) => c.type === 'bill' ? a + c.amount : a - c.amount, 0);
                          return (
                            <div className="card" key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', borderRight: bal > 0 ? '5px solid red' : '5px solid green'}}>
                              <div onClick={()=>setViewingSup(s)} style={{cursor:'pointer', flex:1}}>
                                <strong>{s.name}</strong>
                                <div style={{color: bal > 0 ? 'red' : 'green', fontWeight:'bold'}}>بقایا: {bal.toLocaleString()} Rs</div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </>
              ) : (
                <div className="container">
                  <div className="no-print" style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                      <button className="btn btn-gray" onClick={()=>setViewingSup(null)}>← واپس لسٹ</button>
                      <button className="btn btn-blue" onClick={handlePrint}>🖨 بل پرنٹ کریں</button>
                  </div>
                  
                  <div className="card" style={{marginTop:'10px'}}>
                    <h3 style={{margin:'0 0 10px 0', textAlign:'center'}}>{viewingSup.name} کا کھاتہ</h3>
                    <div className="summary-box">
                      <div><small>ٹوٹل بل</small><br/><strong style={{color:'red'}}>{ledger.filter(l=>l.supplierId===viewingSup.id && l.type==='bill').reduce((a,c)=>a+c.amount,0).toLocaleString()}</strong></div>
                      <div><small>ٹوٹل ادا</small><br/><strong style={{color:'green'}}>{ledger.filter(l=>l.supplierId===viewingSup.id && l.type==='payment').reduce((a,c)=>a+c.amount,0).toLocaleString()}</strong></div>
                      <div className="balance-highlight">بقایا: {ledger.filter(l=>l.supplierId===viewingSup.id).reduce((a,c)=>c.type==='bill'?a+c.amount:a-c.amount,0).toLocaleString()} Rs</div>
                    </div>
                    <div className="no-print" style={{display:'flex', gap:'5px'}}>
                      <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'bill'})}>+ بل انٹری</button>
                      <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'payment'})}>+ ادائیگی</button>
                    </div>
                  </div>

                  <div className="card">
                    <table>
                      <thead><tr><th>تاریخ</th><th>تفصیل</th><th>بل</th><th>ادا</th></tr></thead>
                      <tbody>
                        {ledger.filter(l => l.supplierId === viewingSup.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => (
                          <tr key={l.id}>
                            <td>{l.date}</td>
                            <td style={{fontSize:'12px'}}>{l.note}</td>
                            <td style={{color:'red'}}>{l.type==='bill'?l.amount:'-'}</td>
                            <td style={{color:'green'}}>{l.type==='payment'?l.amount:'-'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
          </div>

          {/* Modal System */}
          {modal && (
            <div className="modal">
              <div className="card" style={{width:'90%', maxWidth:'450px', maxHeight:'90vh', overflowY:'auto'}}>
                
                {modal.type === 'stockAction' && (
                  <form className="no-print" onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    const amt = parseInt(f.get('qty'));
                    const dateStr = f.get('date');
                    
                    if(modal.actionType === 'in') {
                      const rate = parseInt(f.get('rate'));
                      const bill = amt * rate;
                      
                      let currentSups = [...suppliers];
                      let targetSup = currentSups.find(x => x.name === modal.item.supplier);
                      if(!targetSup) {
                        targetSup = { id: Date.now() + 1, name: modal.item.supplier };
                        currentSups.push(targetSup);
                      }
                      
                      const ledgerEntryId = Date.now() + 2;
                      const ledgerEntry = { id: ledgerEntryId, supplierId: targetSup.id, date: dateStr, type: 'bill', amount: bill, note: `وصولی: ${modal.item.name} (${amt} درجن)` };
                      const historyEntry = { id: Date.now()+3, itemId: modal.item.id, date: dateStr, type: 'in', qty: amt, rate: rate, ledgerId: ledgerEntryId };
                      
                      sync(currentSups, stock.map(s => s.id === modal.item.id ? {...s, qty: s.qty + amt, rate: rate} : s), [ledgerEntry, ...ledger], [historyEntry, ...stockHistory]);
                    } else {
                      if(modal.item.qty < amt) { alert("اسٹاک میں اتنا مال نہیں ہے!"); return; }
                      const historyEntry = { id: Date.now()+3, itemId: modal.item.id, date: dateStr, type: 'out', qty: amt };
                      // مال بیچنے پر 'sold' کالم میں بھی اضافہ کیا جائے
                      sync(suppliers, stock.map(s => s.id === modal.item.id ? {...s, qty: s.qty - amt, sold: (s.sold || 0) + amt} : s), ledger, [historyEntry, ...stockHistory]);
                    }
                    setModal(null);
                  }}>
                    <h3 style={{marginTop:0, color: modal.actionType==='in'?'#2ecc71':'#e74c3c'}}>{modal.actionType === 'in' ? 'مال وصول کریں (+)' : 'مال فروخت کریں (-)'}</h3>
                    <p style={{margin:'0 0 10px 0', fontSize:'14px', color:'#555'}}>{modal.item.name} ({modal.item.supplier})</p>
                    <label>تاریخ:</label>
                    <input type="date" name="date" defaultValue={new Date().toISOString().split('T')[0]} required />
                    <label>مقدار (درجن):</label>
                    <input type="number" name="qty" required />
                    {modal.actionType === 'in' && (
                      <>
                        <label>ریٹ (فی درجن):</label>
                        <input type="number" name="rate" defaultValue={modal.item.rate || ''} required />
                      </>
                    )}
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>انٹری سیو کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}

                {/* اسٹاک ہسٹری دکھانے والا ماڈل */}
                {modal.type === 'viewStockHistory' && (() => {
                  // نیا اور پکا فارمولا
                  const totalRec = modal.item.qty + (modal.item.sold || 0);
                  const rem = (modal.item.totalOrdered || 0) - totalRec;
                  
                  return (
                  <div>
                    <div className="print-only">
                       <h1 style={{margin:0, color:'#2c3e50'}}>نیو قاری ہوزری سٹور</h1>
                       <p style={{margin:'5px 0', fontSize:'14px'}}>نزد مبارک مسجد، بلاک اے، قائد اعظم مارکیٹ، فیصل آباد</p>
                       <p style={{margin:'0 0 10px 0', fontSize:'14px', fontWeight:'bold'}}>فون: 0306-5378112</p>
                       <hr style={{borderTop:'2px solid #2c3e50'}}/>
                    </div>

                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <h3 style={{marginTop:0}}>{modal.item.name} کا ریکارڈ</h3>
                        <button className="btn btn-blue no-print" onClick={handlePrint}>🖨 پرنٹ</button>
                    </div>
                    <p style={{margin:'0 0 10px 0', fontSize:'14px', color:'#555'}}>سپلائر: {modal.item.supplier}</p>
                    
                    <div className="summary-box">
                      <div><small>کل آرڈر</small><br/><strong>{modal.item.totalOrdered || 0}</strong></div>
                      <div><small>وصول شدہ</small><br/><strong style={{color:'green'}}>{totalRec}</strong></div>
                      <div className="balance-highlight">
                        بقایا مال (آنا باقی): {rem > 0 ? rem : 0} درجن
                      </div>
                    </div>

                    <table style={{fontSize:'13px', width:'100%', textAlign:'center'}}>
                      <thead><tr><th>تاریخ</th><th>عمل</th><th>مقدار</th><th className="no-print">ایکشن</th></tr></thead>
                      <tbody>
                        {stockHistory.filter(h => h.itemId === modal.item.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h => (
                          <tr key={h.id}>
                            <td>{h.date}</td>
                            <td style={{color: h.type==='in'?'#2ecc71':'#e74c3c', fontWeight:'bold'}}>{h.type==='in' ? `آمد (${h.rate}Rs)` : 'فروخت'}</td>
                            <td>{h.qty}</td>
                            <td className="no-print">
                              <button className="btn btn-orange" style={{padding:'2px 4px'}} onClick={()=>setModal({type:'editStockHistory', data: h, item: modal.item})}>✎</button>
                              <button className="btn btn-red" style={{padding:'2px 4px'}} onClick={()=>deleteHistoryEntry(h, modal.item)}>🗑</button>
                            </td>
                          </tr>
                        ))}
                        {stockHistory.filter(h => h.itemId === modal.item.id).length === 0 && (
                          <tr><td colSpan="4">ابھی تک کوئی ریکارڈ موجود نہیں ہے۔</td></tr>
                        )}
                      </tbody>
                    </table>
                    <button className="btn btn-gray no-print" style={{width:'100%', marginTop:'15px'}} onClick={()=>setModal(null)}>بند کریں</button>
                  </div>
                )})()}

                {modal.type === 'editStockHistory' && (
                  <form className="no-print" onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    const newDate = f.get('date');
                    const newQty = parseInt(f.get('qty'));
                    const newRate = modal.data.type === 'in' ? parseInt(f.get('rate')) : 0;
                    
                    let nStock = [...stock];
                    let nLedger = [...ledger];
                    
                    if(modal.data.type === 'in') {
                       const qtyDiff = newQty - modal.data.qty;
                       nStock = nStock.map(s => s.id === modal.item.id ? {...s, qty: s.qty + qtyDiff, rate: newRate} : s);
                       if(modal.data.ledgerId) {
                           const newBill = newQty * newRate;
                           nLedger = nLedger.map(l => l.id === modal.data.ledgerId ? {...l, amount: newBill, date: newDate, note: `وصولی: ${modal.item.name} (${newQty} درجن)`} : l);
                       }
                    } else {
                       const qtyDiff = newQty - modal.data.qty;
                       // ایڈٹ پر 'sold' کی تعداد بھی ایڈجسٹ کی جائے
                       nStock = nStock.map(s => s.id === modal.item.id ? {...s, qty: s.qty - qtyDiff, sold: (s.sold || 0) + qtyDiff} : s);
                    }
                    
                    const nHistory = stockHistory.map(h => h.id === modal.data.id ? {...h, date: newDate, qty: newQty, rate: newRate} : h);
                    sync(suppliers, nStock, nLedger, nHistory);
                    setModal({type:'viewStockHistory', item: modal.item});
                  }}>
                    <h3>انٹری درست کریں ({modal.data.type==='in'?'آمد':'فروخت'})</h3>
                    <label>تاریخ:</label>
                    <input type="date" name="date" defaultValue={modal.data.date} required />
                    <label>مقدار (درجن):</label>
                    <input type="number" name="qty" defaultValue={modal.data.qty} required />
                    {modal.data.type === 'in' && (
                      <>
                        <label>ریٹ:</label>
                        <input type="number" name="rate" defaultValue={modal.data.rate} required />
                      </>
                    )}
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>محفوظ کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal({type:'viewStockHistory', item: modal.item})}>کینسل</button>
                  </form>
                )}

                {modal.type === 'addSup' && (
                  <div className="no-print">
                    <h3>نیا سپلائر</h3>
                    <input id="supNameIn" placeholder="نام لکھیں..." />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}} onClick={()=>{
                      const n = document.getElementById('supNameIn').value;
                      if(n) { sync([...suppliers, {id: Date.now(), name: n}], stock, ledger); setModal(null); }
                    }}>محفوظ کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setModal(null)}>کینسل</button>
                  </div>
                )}
                {modal.type === 'addStock' && (
                  <form className="no-print" onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    const sName = f.get('s');
                    const nId = Date.now();
                    let nSups = [...suppliers];
                    if(!suppliers.find(x=>x.name === sName)) nSups.push({id: nId+1, name: sName});
                    sync(nSups, [...stock, {id: nId, name: f.get('n'), supplier: sName, qty: 0, sold: 0, rate: parseInt(f.get('r')), totalOrdered: parseInt(f.get('o'))}], ledger);
                    setModal(null);
                  }}>
                    <h3>نیا آئٹم</h3>
                    <label>آئٹم نام:</label> <input name="n" required />
                    <label>سپلائر نام:</label> <input name="s" list="supList" required />
                    <datalist id="supList">{suppliers.map(s=><option key={s.id} value={s.name}/>)}</datalist>
                    <label>ٹوٹل آرڈر (جو منگوایا):</label> <input name="o" type="number" required />
                    <label>ریٹ:</label> <input name="r" type="number" required />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>سیو</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
                {modal.type === 'editStock' && (
                  <form className="no-print" onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    sync(suppliers, stock.map(s => s.id === modal.data.id ? {...s, name: f.get('n'), supplier: f.get('s'), totalOrdered: parseInt(f.get('o')), rate: parseInt(f.get('r')), qty: parseInt(f.get('q'))} : s), ledger);
                    setModal(null);
                  }}>
                    <h3>ایڈٹ اسٹاک</h3>
                    <label>آئٹم نام:</label><input name="n" defaultValue={modal.data.name} />
                    <label>سپلائر:</label><input name="s" defaultValue={modal.data.supplier} />
                    <label>ٹوٹل آرڈر:</label><input name="o" type="number" defaultValue={modal.data.totalOrdered} />
                    <label>موجودہ اسٹاک:</label><input name="q" type="number" defaultValue={modal.data.qty} />
                    <label>ریٹ:</label><input name="r" type="number" defaultValue={modal.data.rate} />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>اپ ڈیٹ</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
                {modal.type === 'addEntry' && (
                  <form className="no-print" onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    sync(suppliers, stock, [{id: Date.now(), supplierId: viewingSup.id, date: f.get('d'), type: modal.entryType, amount: parseInt(f.get('a')), note: f.get('n')}, ...ledger]);
                    setModal(null);
                  }}>
                    <h3>{modal.entryType==='bill'?'بل انٹری':'ادائیگی'}</h3>
                    <input type="date" name="d" defaultValue={new Date().toISOString().split('T')[0]} />
                    <input type="number" name="a" placeholder="رقم" required />
                    <input name="n" placeholder="تفصیل" />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>سیو کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
