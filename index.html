<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Khata - New Qari Hosiery Store</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body { margin: 0; background: #f4f7f6; font-family: system-ui; direction: rtl; }
    .header { background: #2c3e50; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    
    .tab-bar { 
      display: flex; 
      background: #fff; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      position: sticky; 
      top: 0; 
      z-index: 10; 
      justify-content: space-around;
      position: relative;
    }
    .tab-btn { 
      flex: 1; 
      padding: 14px 5px; 
      border: none; 
      background: none; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 14px; 
      color: #7f8c8d;
      transition: 0.3s;
    }
    .active-tab { 
      border-bottom: 4px solid #3498db; 
      color: #3498db; 
      background: #f0f8ff;
    }

    .more-menu {
      position: absolute;
      top: 50px;
      left: 10px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      width: 160px;
      z-index: 100;
      padding: 5px 0;
      border: 1px solid #eee;
    }
    .more-item {
      padding: 15px;
      border-bottom: 1px solid #f9f9f9;
      text-align: right;
      cursor: pointer;
      font-weight: bold;
      color: #2c3e50;
      font-size: 14px;
    }
    .more-item:active { background: #f1f1f1; }
    .more-item:last-child { border-bottom: none; }

    .container { padding: 10px; max-width: 650px; margin: auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 2px; }
    .btn-blue { background: #3498db; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e74c3c; color: white; }
    .btn-orange { background: #f39c12; color: white; }
    .btn-gray { background: #95a5a6; color: white; }
    .btn-purple { background: #9b59b6; color: white; }
    .btn-dark { background: #34495e; color: white; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
    .search-input { border: 2px solid #3498db; background-color: #f0f8ff; font-weight: bold; }
    .total-banner { background: #2ecc71; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 10px; font-weight: bold; }
    table { width: 100%; text-align: right; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:1000; padding:10px; }
    
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .card { box-shadow: none !important; border: 1px solid #ccc !important; }
      th, td { border: 1px solid #000; padding: 8px; text-align: center; }
      table { border: 1px solid #000; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = { apiKey: "AIzaSyCb7MQuMjkDuDGc0PXFK07xb8eN1_srbGU", authDomain: "farman-93e1d.firebaseapp.com", projectId: "farman-93e1d", storageBucket: "farman-93e1d.firebasestorage.app", messagingSenderId: "838060218283", appId: "1:838060218283:web:92df7394c10ea4212264ee" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [authMode, setAuthMode] = useState('login');
      const [loading, setLoading] = useState(true);

      const [activeTab, setActiveTab] = useState('stock');
      const [showMore, setShowMore] = useState(false);
      const [storeProfile, setStoreProfile] = useState({ storeName: 'نیو قاری ہوزری اسٹور', phone: '0306-5378112', address: 'فیصل آباد' });
      
      const [suppliers, setSuppliers] = useState([]);
      const [stock, setStock] = useState([]);
      const [ledger, setLedger] = useState([]);
      const [stockHistory, setStockHistory] = useState([]); 
      const [customers, setCustomers] = useState([]);
      const [customerLedger, setCustomerLedger] = useState([]);
      const [capitalAccounts, setCapitalAccounts] = useState([]);
      const [capitalLedger, setCapitalLedger] = useState([]);
      const [cashLedger, setCashLedger] = useState([]); 

      const [viewingSup, setViewingSup] = useState(null);
      const [viewingCust, setViewingCust] = useState(null);
      const [viewingCap, setViewingCap] = useState(null);
      const [modal, setModal] = useState(null);
      
      const [stockSearch, setStockSearch] = useState('');
      const [supplierSearch, setSupplierSearch] = useState('');
      const [custSearch, setCustSearch] = useState('');
      const [stuckSearch, setStuckSearch] = useState('');
      const [capSearch, setCapSearch] = useState('');
      
      const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));

      useEffect(() => {
        firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          if(u) {
            db.collection('user_data').doc(u.uid).get().then(doc => {
              if (doc.exists) {
                const d = doc.data();
                setStoreProfile(d.profile || { storeName: 'نیو قاری ہوزری اسٹور', phone: '0306-5378112', address: 'فیصل آباد' });
                setSuppliers(d.suppliers || []); setStock(d.stock || []); setLedger(d.ledger || []); setStockHistory(d.stockHistory || []); setCustomers(d.customers || []); setCustomerLedger(d.customerLedger || []); setCapitalAccounts(d.capitalAccounts || []); setCapitalLedger(d.capitalLedger || []); setCashLedger(d.cashLedger || []);
              }
              setLoading(false);
            });
          } else {
            setLoading(false);
          }
        });
      }, []);

      const sync = (newProfile=storeProfile, newS=suppliers, newSt=stock, newL=ledger, newSH=stockHistory, newCust=customers, newCL=customerLedger, newCap=capitalAccounts, newCapL=capitalLedger, newCash=cashLedger) => {
        setStoreProfile(newProfile); setSuppliers(newS); setStock(newSt); setLedger(newL); setStockHistory(newSH); setCustomers(newCust); setCustomerLedger(newCL); setCapitalAccounts(newCap); setCapitalLedger(newCapL); setCashLedger(newCash);
        if(user) {
            db.collection('user_data').doc(user.uid).set({ profile: newProfile, suppliers: newS, stock: newSt, ledger: newL, stockHistory: newSH, customers: newCust, customerLedger: newCL, capitalAccounts: newCap, capitalLedger: newCapL, cashLedger: newCash }, { merge: true });
        }
      };

      const deleteRecord = (col, id, msg = 'کیا آپ واقعی اسے ڈیلیٹ کرنا چاہتے ہیں؟') => {
        if(!confirm(msg)) return;
        let nS=[...suppliers], nSt=[...stock], nL=[...ledger], nSH=[...stockHistory], nC=[...customers], nCL=[...customerLedger], nCap=[...capitalAccounts], nCapL=[...capitalLedger], nCash=[...cashLedger];
        
        if(col === 'supplier') nS = nS.filter(x=>x.id!==id);
        if(col === 'customer') nC = nC.filter(x=>x.id!==id);
        if(col === 'capital') nCap = nCap.filter(x=>x.id!==id);
        if(col === 'stock') nSt = nSt.filter(x=>x.id!==id);
        if(col === 'ledger') nL = nL.filter(x=>x.id!==id);
        if(col === 'customerLedger') nCL = nCL.filter(x=>x.id!==id);
        if(col === 'cashLedger') nCash = nCash.filter(x=>x.id!==id);
        if(col === 'capitalLedger') nCapL = nCapL.filter(x=>x.id!==id);
        
        sync(storeProfile, nS, nSt, nL, nSH, nC, nCL, nCap, nCapL, nCash);
        
        if(col === 'supplier' && viewingSup && viewingSup.id === id) setViewingSup(null);
        if(col === 'customer' && viewingCust && viewingCust.id === id) setViewingCust(null);
        if(col === 'capital' && viewingCap && viewingCap.id === id) setViewingCap(null);
      };

      const handleAuth = (e) => {
          e.preventDefault();
          const email = e.target.email.value;
          const password = e.target.password.value;
          if(authMode === 'login') {
              firebase.auth().signInWithEmailAndPassword(email, password).catch(err => alert("لاگ ان ناکام: " + err.message));
          } else {
              firebase.auth().createUserWithEmailAndPassword(email, password)
              .then(cred => {
                  db.collection('user_data').doc(cred.user.uid).set({ profile: { storeName: 'نیو قاری ہوزری اسٹور', phone: '0306-5378112', address: 'فیصل آباد' } });
              }).catch(err => alert("اکاؤنٹ بنانے میں مسئلہ: " + err.message));
          }
      };

      const handleLogout = () => { if(confirm('کیا آپ لاگ آؤٹ کرنا چاہتے ہیں؟')) firebase.auth().signOut(); };

      const getCustBal = (cId) => customerLedger.filter(l => l.customerId === cId).reduce((a,x) => x.type === 'bill' ? a + x.amount : a - x.amount, 0);
      const totalValue = stock.reduce((acc, s) => acc + (s.qty * (s.rate || 0)), 0);
      const totalPayable = ledger.reduce((acc, c) => c.type === 'bill' ? acc + c.amount : acc - c.amount, 0); 
      const totalCapital = capitalLedger.reduce((acc, c) => c.type === 'in' ? acc + c.amount : acc - c.amount, 0);
      const totalCash = cashLedger.reduce((acc, c) => c.type === 'in' ? acc + c.amount : acc - c.amount, 0);

      const activeCustomers = customers.filter(c => !c.isStuck);
      const stuckCustomers = customers.filter(c => c.isStuck);
      const totalActiveReceivable = activeCustomers.reduce((a,c) => a + getCustBal(c.id), 0);
      const totalStuckReceivable = stuckCustomers.reduce((a,c) => a + getCustBal(c.id), 0);

      const filteredStock = stock.filter(s => s.name.includes(stockSearch) || s.supplier.includes(stockSearch));
      const filteredSuppliers = suppliers.filter(s => s.name.includes(supplierSearch));
      const filteredActiveCustomers = activeCustomers.filter(c => c.name.includes(custSearch));
      const filteredStuckCustomers = stuckCustomers.filter(c => c.name.includes(stuckSearch));
      const filteredCapitals = capitalAccounts.filter(c => c.name.includes(capSearch));

      const activeSupLedger = viewingSup ? ledger.filter(l=>l.supplierId===viewingSup.id) : [];
      const totalSupBill = activeSupLedger.reduce((a,c)=>c.type==='bill'?a+c.amount:a, 0);
      const totalSupPaid = activeSupLedger.reduce((a,c)=>c.type==='payment'?a+c.amount:a, 0);
      const supBal = totalSupBill - totalSupPaid;

      const activeCustLedger = viewingCust ? customerLedger.filter(l=>l.customerId===viewingCust.id) : [];
      const totalCustBill = activeCustLedger.reduce((a,c)=>c.type==='bill'?a+c.amount:a, 0);
      const totalCustPaid = activeCustLedger.reduce((a,c)=>c.type==='payment'?a+c.amount:a, 0);
      const custBal = totalCustBill - totalCustPaid;

      const activeCapLedger = viewingCap ? capitalLedger.filter(l=>l.accountId===viewingCap.id) : [];
      const totalCapIn = activeCapLedger.reduce((a,c)=>c.type==='in'?a+c.amount:a, 0);
      const totalCapOut = activeCapLedger.reduce((a,c)=>c.type==='out'?a+c.amount:a, 0);
      const capBal = totalCapIn - totalCapOut;

      if (loading) return <div style={{textAlign:'center', padding:'50px'}}>لوڈ ہو رہا ہے...</div>;

      if (!user) {
        return (
          <div style={{background: '#2c3e50', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px'}}>
            <div style={{background: 'white', padding: '30px', borderRadius: '15px', width: '100%', maxWidth: '400px', textAlign: 'center'}}>
              <h1 style={{color: '#2c3e50'}}>ڈیجیٹل کھاتہ</h1>
              <form onSubmit={handleAuth}>
                  <input type="email" name="email" placeholder="ای میل" required />
                  <input type="password" name="password" placeholder="پاس ورڈ" required />
                  <button className="btn btn-blue" style={{width:'100%'}}>لاگ ان کریں</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div className={modal ? "no-print" : ""}>
              <div className="header no-print">
                  <h2 style={{margin:0}}>{storeProfile.storeName}</h2>
                  <button onClick={handleLogout} className="btn btn-red">لاگ آؤٹ</button>
              </div>
              
              {!viewingSup && !viewingCust && !viewingCap ? (
                <>
                  <div className="tab-bar no-print">
                    <button className={`tab-btn ${activeTab==='stock'?'active-tab':''}`} onClick={()=>{setActiveTab('stock'); setShowMore(false)}}>اسٹاک</button>
                    <button className={`tab-btn ${activeTab==='ledger'?'active-tab':''}`} onClick={()=>{setActiveTab('ledger'); setShowMore(false)}}>سپلائر</button>
                    <button className={`tab-btn ${activeTab==='customers'?'active-tab':''}`} onClick={()=>{setActiveTab('customers'); setShowMore(false)}}>کسٹمر</button>
                    <button className={`tab-btn ${activeTab==='cash'?'active-tab':''}`} onClick={()=>{setActiveTab('cash'); setShowMore(false)}}>کیش بک</button>
                    <button className={`tab-btn ${['capital','stuck','settings'].includes(activeTab)?'active-tab':''}`} onClick={()=>setShowMore(!showMore)}>مزید ☰</button>
                    
                    {showMore && (
                      <div className="more-menu">
                        <div className="more-item" onClick={()=>{setActiveTab('capital'); setShowMore(false)}}>💰 سرمایہ</div>
                        <div className="more-item" onClick={()=>{setActiveTab('stuck'); setShowMore(false)}}>⚠️ رکے کھاتے</div>
                        <div className="more-item" onClick={()=>{setActiveTab('settings'); setShowMore(false)}}>⚙️ سیٹنگز</div>
                      </div>
                    )}
                  </div>
                  <div className="container">
                    {activeTab === 'stock' && (
                      <div>
                        <div className="total-banner">گودام مالیت: {totalValue.toLocaleString()} Rs</div>
                        <input type="text" className="search-input" placeholder="تلاش کریں..." value={stockSearch} onChange={(e)=>setStockSearch(e.target.value)} />
                        <div className="card">
                          <table>
                            <thead><tr><th>آئٹم</th><th>آرڈر</th><th>موجود</th><th className="no-print">ایکشن</th></tr></thead>
                            <tbody>
                              {filteredStock.map(s => (
                                <tr key={s.id}>
                                  <td><strong>{s.name}</strong><br/><small>{s.supplier}</small></td><td>{s.totalOrdered}</td><td>{s.qty}</td>
                                  <td className="no-print" style={{ display: 'flex', flexWrap: 'wrap', gap: '4px', justifyContent: 'center' }}>
                                    <button className="btn btn-green" onClick={()=>setModal({type:'stockAction', actionType:'in', item:s})}>+</button>
                                    <button className="btn btn-orange" onClick={()=>setModal({type:'stockAction', actionType:'out', item:s})}>-</button>
                                    <button className="btn btn-blue" onClick={()=>setModal({type:'viewStockHistory', item:s})}>📋</button>
                                    <button className="btn btn-gray" onClick={()=>setModal({type:'editStock', item:s})}>✎</button>
                                    <button className="btn btn-red" onClick={()=>deleteRecord('stock', s.id)}>🗑</button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          <button className="btn btn-blue no-print" style={{width:'100%', marginTop:'10px'}} onClick={()=>setModal({type:'addStock'})}>+ نیا آئٹم</button>
                        </div>
                      </div>
                    )}

                    {activeTab === 'ledger' && (
                      <div>
                        <div className="total-banner" style={{background:'#e74c3c'}}>کل واجب الادا: {totalPayable.toLocaleString()} Rs</div>
                        <input type="text" className="search-input" placeholder="تلاش..." value={supplierSearch} onChange={(e)=>setSupplierSearch(e.target.value)} />
                        {filteredSuppliers.map(s => {
                          const bal = ledger.filter(l=>l.supplierId===s.id).reduce((a,c)=>c.type==='bill'?a+c.amount:a-c.amount,0);
                          return (
                            <div className="card" key={s.id} onClick={()=>setViewingSup(s)} style={{cursor:'pointer', borderRight: bal > 0 ? '5px solid red' : '5px solid green'}}>
                              <strong>{s.name}</strong><div>بقایا: {bal.toLocaleString()}</div>
                              <div style={{position:'absolute', left:'10px', top:'15px'}} className="no-print">
                                  <button className="btn btn-gray" style={{padding:'4px 8px'}} onClick={(e)=>{e.stopPropagation(); setModal({type:'editName', col:'supplier', item:s})}}>✎</button>
                                  <button className="btn btn-red" style={{padding:'4px 8px'}} onClick={(e)=>{e.stopPropagation(); deleteRecord('supplier', s.id)}}>🗑</button>
                              </div>
                            </div>
                          );
                        })}
                        <button className="btn btn-blue no-print" style={{width:'100%', marginTop:'10px'}} onClick={()=>setModal({type:'addSup'})}>+ نیا سپلائر</button>
                      </div>
                    )}

                    {activeTab === 'customers' && (
                      <div>
                        <div className="total-banner" style={{background:'#2ecc71'}}>ایکٹو کسٹمر بیلنس: {totalActiveReceivable.toLocaleString()} Rs</div>
                        <input type="text" className="search-input" placeholder="تلاش..." value={custSearch} onChange={(e)=>setCustSearch(e.target.value)} />
                        {filteredActiveCustomers.map(c => {
                          const bal = getCustBal(c.id);
                          return (
                            <div className="card" key={c.id} onClick={()=>setViewingCust(c)} style={{cursor:'pointer', borderRight: bal > 0 ? '5px solid red' : '5px solid green'}}>
                              <strong>{c.name}</strong><div>بقایا: {bal.toLocaleString()}</div>
                              <div style={{position:'absolute', left:'10px', top:'15px'}} className="no-print">
                                  <button className="btn btn-gray" style={{padding:'4px 8px'}} onClick={(e)=>{e.stopPropagation(); setModal({type:'editName', col:'customer', item:c})}}>✎</button>
                                  <button className="btn btn-red" style={{padding:'4px 8px'}} onClick={(e)=>{e.stopPropagation(); deleteRecord('customer', c.id)}}>🗑</button>
                              </div>
                            </div>
                          );
                        })}
                        <button className="btn btn-blue no-print" style={{width:'100%', marginTop:'10px'}} onClick={()=>setModal({type:'addCust'})}>+ نیا کسٹمر</button>
                      </div>
                    )}

                    {activeTab === 'cash' && (
                      <div>
                        <div className="total-banner" style={{background:'#f39c12'}}>موجودہ کیش: {totalCash.toLocaleString()} Rs</div>
                        <div style={{display:'flex', gap:'5px', marginBottom:'10px'}} className="no-print">
                            <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addCashEntry', entryType:'in'})}>آمد</button>
                            <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addCashEntry', entryType:'out'})}>خرچ</button>
                        </div>
                        <div className="card">
                          <table><thead><tr><th>تاریخ</th><th>تفصیل</th><th>آمد</th><th>خرچ</th><th className="no-print">ایکشن</th></tr></thead><tbody>
                            {filteredCash.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => (
                              <tr key={l.id}>
                                <td>{l.date}</td><td>{l.note}</td><td style={{color:'green'}}>{l.type==='in'?l.amount:'-'}</td><td style={{color:'red'}}>{l.type==='out'?l.amount:'-'}</td>
                                <td className="no-print">
                                  <button className="btn btn-gray" style={{padding:'2px 5px'}} onClick={()=>setModal({type:'editEntry', col:'cashLedger', item:l})}>✎</button>
                                  <button className="btn btn-red" style={{padding:'2px 5px'}} onClick={()=>deleteRecord('cashLedger', l.id)}>🗑</button>
                                </td>
                              </tr>
                            ))}
                          </tbody></table>
                        </div>
                      </div>
                    )}

                    {activeTab === 'stuck' && (
                      <div>
                        <div className="total-banner" style={{background:'#34495e'}}>رکے کھاتے: {totalStuckReceivable.toLocaleString()} Rs</div>
                        {filteredStuckCustomers.map(c => {
                           const bal = getCustBal(c.id);
                           return (
                             <div className="card" key={c.id} onClick={()=>setViewingCust(c)} style={{cursor:'pointer', borderRight:'5px solid #34495e'}}>
                               <strong>{c.name}</strong><div>پھنسی رقم: {bal.toLocaleString()}</div>
                             </div>
                           );
                        })}
                      </div>
                    )}

                    {activeTab === 'capital' && (
                      <div>
                        <div className="total-banner" style={{background:'#9b59b6'}}>کل سرمایہ: {totalCapital.toLocaleString()} Rs</div>
                        {filteredCapitals.map(c => {
                           const bal = capitalLedger.filter(l=>l.accountId===c.id).reduce((a,x)=>x.type==='in'?a+x.amount:a-x.amount,0);
                           return (
                             <div className="card" key={c.id} onClick={()=>setViewingCap(c)} style={{cursor:'pointer', borderRight:'5px solid #9b59b6'}}>
                               <strong>{c.name}</strong><div>بیلنس: {bal.toLocaleString()}</div>
                             </div>
                           );
                        })}
                        <button className="btn btn-purple no-print" style={{width:'100%', marginTop:'10px'}} onClick={()=>setModal({type:'addCapAccount'})}>+ نیا سرمایہ اکاؤنٹ</button>
                      </div>
                    )}
                  </div>
                </>
              ) : viewingSup ? (
                <div className="container">
                  <button className="btn btn-gray no-print" onClick={()=>setViewingSup(null)}>← واپس</button>
                  <div className="card">
                    <h3>{viewingSup.name} (سپلائر)</h3>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px', textAlign:'center', fontSize:'12px'}}>
                        <div style={{background:'#ffeaa7', padding:'10px', borderRadius:'8px'}}><strong>کل مال آیا</strong><br/>{totalSupBill.toLocaleString()}</div>
                        <div style={{background:'#55efc4', padding:'10px', borderRadius:'8px'}}><strong>کل ادائیگی</strong><br/>{totalSupPaid.toLocaleString()}</div>
                        <div style={{background:'#fff', border:'2px solid red', padding:'10px', borderRadius:'8px'}}><strong>بقایا رقم</strong><br/>{supBal.toLocaleString()}</div>
                    </div>
                    <div style={{display:'flex', gap:'5px', marginTop:'10px'}} className="no-print">
                        <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'bill'})}>بل انٹری</button>
                        <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'payment'})}>ادائیگی</button>
                    </div>
                  </div>
                  <div className="card">
                    <table>
                      <thead><tr><th>تاریخ</th><th>تفصیل</th><th>بل</th><th>ادا</th><th className="no-print">ایکشن</th></tr></thead>
                      <tbody>
                        {activeSupLedger.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>(
                          <tr key={l.id}>
                            <td>{l.date}</td><td>{l.note}</td><td>{l.type==='bill'?l.amount:'-'}</td><td>{l.type==='payment'?l.amount:'-'}</td>
                            <td className="no-print">
                              <button className="btn btn-gray" style={{padding:'2px 5px'}} onClick={()=>setModal({type:'editEntry', col:'ledger', item:l})}>✎</button>
                              <button className="btn btn-red" style={{padding:'2px 5px'}} onClick={()=>deleteRecord('ledger', l.id)}>🗑</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : viewingCust ? (
                <div className="container">
                  <button className="btn btn-gray no-print" onClick={()=>setViewingCust(null)}>← واپس</button>
                  <div className="card">
                    <h3>{viewingCust.name} {viewingCust.isStuck ? '(رکا کھاتہ)' : ''}</h3>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px', textAlign:'center', fontSize:'12px'}}>
                        <div style={{background:'#fab1a0', padding:'10px', borderRadius:'8px'}}><strong>کل بل</strong><br/>{totalCustBill.toLocaleString()}</div>
                        <div style={{background:'#81ecec', padding:'10px', borderRadius:'8px'}}><strong>وصولی</strong><br/>{totalCustPaid.toLocaleString()}</div>
                        <div style={{background:'#fff', border:'2px solid green', padding:'10px', borderRadius:'8px'}}><strong>بقایا</strong><br/>{custBal.toLocaleString()}</div>
                    </div>
                    <div style={{display:'flex', gap:'5px', marginTop:'10px'}} className="no-print">
                        <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addCustEntry', entryType:'bill'})}>بل</button>
                        <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addCustEntry', entryType:'وصولی'})}>وصولی</button>
                    </div>
                  </div>
                  <div className="card">
                    <table>
                      <thead><tr><th>تاریخ</th><th>تفصیل</th><th>بل</th><th>وصولی</th><th className="no-print">ایکشن</th></tr></thead>
                      <tbody>
                        {activeCustLedger.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>(
                          <tr key={l.id}>
                            <td>{l.date}</td><td>{l.note}</td><td>{l.type==='bill'?l.amount:'-'}</td><td>{l.type==='payment'?l.amount:'-'}</td>
                            <td className="no-print">
                              <button className="btn btn-gray" style={{padding:'2px 5px'}} onClick={()=>setModal({type:'editEntry', col:'customerLedger', item:l})}>✎</button>
                              <button className="btn btn-red" style={{padding:'2px 5px'}} onClick={()=>deleteRecord('customerLedger', l.id)}>🗑</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : viewingCap ? (
                <div className="container">
                  <button className="btn btn-gray no-print" onClick={()=>setViewingCap(null)}>← واپس</button>
                  <div className="card">
                    <h3>{viewingCap.name}</h3>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'5px', textAlign:'center', fontSize:'12px'}}>
                        <div style={{background:'#55efc4', padding:'10px', borderRadius:'8px'}}><strong>کل آمد</strong><br/>{totalCapIn.toLocaleString()}</div>
                        <div style={{background:'#fab1a0', padding:'10px', borderRadius:'8px'}}><strong>کل خرچ</strong><br/>{totalCapOut.toLocaleString()}</div>
                        <div style={{background:'#fff', border:'2px solid purple', padding:'10px', borderRadius:'8px'}}><strong>بیلنس</strong><br/>{capBal.toLocaleString()}</div>
                    </div>
                    <div style={{display:'flex', gap:'5px', marginTop:'10px'}} className="no-print">
                      <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addCapEntryMain', entryType:'in'})}>+ آمد</button>
                      <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addCapEntryMain', entryType:'out'})}>- خرچ</button>
                    </div>
                  </div>
                  <div className="card">
                    <table>
                      <thead><tr><th>تاریخ</th><th>تفصیل</th><th>آمد</th><th>خرچ</th><th className="no-print">ایکشن</th></tr></thead>
                      <tbody>
                        {activeCapLedger.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l=>(
                          <tr key={l.id}>
                            <td>{l.date}</td><td>{l.note}</td><td>{l.type==='in'?l.amount:'-'}</td><td>{l.type==='out'?l.amount:'-'}</td>
                            <td className="no-print">
                              <button className="btn btn-gray" style={{padding:'2px 5px'}} onClick={()=>setModal({type:'editEntry', col:'capitalLedger', item:l})}>✎</button>
                              <button className="btn btn-red" style={{padding:'2px 5px'}} onClick={()=>deleteRecord('capitalLedger', l.id)}>🗑</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : null}
          </div>

          {modal && (
            <div className="modal">
              <div className="card" style={{width:'90%', maxWidth:'400px'}}>
                {modal.type === 'stockAction' && (
                  <form onSubmit={(e)=>{ 
                      e.preventDefault(); 
                      const f=new FormData(e.target); 
                      const q=parseInt(f.get('q')); 
                      const date = f.get('d');
                      
                      let nStock = stock.map(s=>s.id===modal.item.id?{...s,qty:modal.actionType==='in'?s.qty+q:s.qty-q, totalOrdered:modal.actionType==='in'?Math.max(0, (s.totalOrdered||0)-q):s.totalOrdered}:s);
                      let nLedger = [...ledger];
                      
                      if(modal.actionType === 'in') {
                          // نام کی حساسیت ختم کر کے سپلائر تلاش کریں
                          const stockSupName = modal.item.supplier.trim();
                          const sup = suppliers.find(s => s.name.trim() === stockSupName);
                          if(sup) {
                              nLedger = [{
                                  id: Date.now() + 1,
                                  supplierId: sup.id,
                                  date: date,
                                  amount: ((modal.item.rate || 0) * q),
                                  note: `${modal.item.name} (وصولی ${q} عدد)`,
                                  type: 'bill'
                              }, ...nLedger];
                          } else {
                              alert(`توجہ فرمائیں: سپلائر "${stockSupName}" سپلائر لسٹ میں نہیں ملا، اس لیے کھاتے میں انٹری نہیں ہوئی۔`);
                          }
                      }
                      
                      sync(storeProfile, suppliers, nStock, nLedger, [{id:Date.now(), itemId:modal.item.id, date:date, type:modal.actionType, qty:q}, ...stockHistory], customers, customerLedger, capitalAccounts, capitalLedger, cashLedger);
                      setModal(null); 
                  }}>
                    <h3>{modal.actionType==='in'?'مال آیا':'مال بکا'}</h3>
                    <input name="d" type="date" defaultValue={new Date().toISOString().split('T')[0]} />
                    <input name="q" type="number" placeholder="مقدار" required />
                    <button className="btn btn-blue" style={{width:'100%'}}>محفوظ</button>
                    <button type="button" onClick={()=>setModal(null)} className="btn btn-gray" style={{width:'100%', marginTop:'5px'}}>کینسل</button>
                  </form>
                )}

                {modal.type === 'editStock' && (
                  <form onSubmit={(e)=>{ 
                      e.preventDefault(); 
                      const f=new FormData(e.target);
                      let nSt = stock.map(x=>x.id===modal.item.id ? {
                          ...x, 
                          name: f.get('n'), 
                          supplier: f.get('s'), 
                          rate: parseInt(f.get('r')),
                          qty: parseInt(f.get('q')),
                          totalOrdered: parseInt(f.get('o'))
                      } : x);
                      sync(storeProfile, suppliers, nSt, ledger, stockHistory, customers, customerLedger, capitalAccounts, capitalLedger, cashLedger);
                      setModal(null);
                  }}>
                    <h3>آئٹم تبدیل کریں</h3>
                    <input name="n" placeholder="نام" defaultValue={modal.item.name} required />
                    <input name="s" placeholder="سپلائر" defaultValue={modal.item.supplier} required />
                    <input name="r" type="number" placeholder="ریٹ" defaultValue={modal.item.rate} required />
                    <input name="q" type="number" placeholder="موجود اسٹاک" defaultValue={modal.item.qty} required />
                    <input name="o" type="number" placeholder="پینڈنگ آرڈر" defaultValue={modal.item.totalOrdered || 0} required />
                    <button className="btn btn-blue" style={{width:'100%'}}>محفوظ</button>
                    <button type="button" onClick={()=>setModal(null)} className="btn btn-gray" style={{width:'100%', marginTop:'5px'}}>کینسل</button>
                  </form>
                )}

                {modal.type === 'editName' && (
                  <form onSubmit={(e)=>{ 
                      e.preventDefault(); 
                      const newName = e.target.n.value;
                      let nS=suppliers, nC=customers, nCap=capitalAccounts;
                      if(modal.col === 'supplier') nS = nS.map(x=>x.id===modal.item.id ? {...x, name:newName} : x);
                      if(modal.col === 'customer') nC = nC.map(x=>x.id===modal.item.id ? {...x, name:newName} : x);
                      if(modal.col === 'capital') nCap = nCap.map(x=>x.id===modal.item.id ? {...x, name:newName} : x);
                      sync(storeProfile, nS, stock, ledger, stockHistory, nC, customerLedger, nCap, capitalLedger, cashLedger);
                      setModal(null);
                  }}>
                      <h3>نام تبدیل کریں</h3>
                      <input name="n" defaultValue={modal.item.name} required />
                      <button className="btn btn-blue" style={{width:'100%'}}>محفوظ</button>
                      <button type="button" onClick={()=>setModal(null)} className="btn btn-gray" style={{width:'100%', marginTop:'5px'}}>کینسل</button>
                  </form>
                )}

                {['addCashEntry','addCustEntry','addEntry','addCapEntryMain'].includes(modal.type) && (
                  <form onSubmit={(e)=>{ 
                      e.preventDefault(); 
                      const d = e.target.d.value; const a = parseInt(e.target.a.value); const n = e.target.n.value;
                      if(modal.type==='addCashEntry') sync(storeProfile, suppliers, stock, ledger, stockHistory, customers, customerLedger, capitalAccounts, capitalLedger, [{id:Date.now(), date:d, amount:a, note:n, type:modal.entryType}, ...cashLedger]);
                      if(modal.type==='addCustEntry') sync(storeProfile, suppliers, stock, ledger, stockHistory, customers, [{id:Date.now(), customerId:viewingCust.id, date:d, amount:a, note:n, type:modal.entryType==='bill'?'bill':'payment'}, ...customerLedger], capitalAccounts, capitalLedger, cashLedger);
                      if(modal.type==='addEntry') sync(storeProfile, suppliers, stock, [{id:Date.now(), supplierId:viewingSup.id, date:d, amount:a, note:n, type:modal.entryType}, ...ledger], stockHistory, customers, customerLedger, capitalAccounts, capitalLedger, cashLedger);
                      if(modal.type==='addCapEntryMain') sync(storeProfile, suppliers, stock, ledger, stockHistory, customers, customerLedger, capitalAccounts, [{id:Date.now(), accountId:viewingCap.id, date:d, amount:a, note:n, type:modal.entryType}, ...capitalLedger], cashLedger);
                      setModal(null); 
                  }}>
                    <h3>انٹری درج کریں</h3>
                    <input name="d" type="date" defaultValue={new Date().toISOString().split('T')[0]} required />
                    <input name="a" type="number" placeholder="رقم" required />
                    <input name="n" placeholder="تفصیل" required />
                    <button className="btn btn-blue" style={{width:'100%'}}>محفوظ</button>
                    <button type="button" onClick={()=>setModal(null)} className="btn btn-gray" style={{width:'100%', marginTop:'5px'}}>کینسل</button>
                  </form>
                )}

                {modal.type === 'viewStockHistory' && (
                  <div>
                    <h3>اسٹاک ہسٹری ({modal.item.name})</h3>
                    <div style={{maxHeight:'300px', overflowY:'auto'}}>
                      <table><thead><tr><th>تاریخ</th><th>قسم</th><th>مقدار</th></tr></thead><tbody>
                        {stockHistory.filter(h=>h.itemId===modal.item.id).map(h=>(
                          <tr key={h.id}><td>{h.date}</td><td style={{color:h.type==='in'?'green':'red'}}>{h.type==='in'?'آمد':'فروخت'}</td><td>{h.qty}</td></tr>
                        ))}
                      </tbody></table>
                    </div>
                    <button className="btn btn-gray" style={{width:'100%', marginTop:'10px'}} onClick={()=>setModal(null)}>بند کریں</button>
                  </div>
                )}
                
                {modal.type === 'addStock' && (
                  <form onSubmit={(e)=>{ e.preventDefault(); const f=new FormData(e.target); sync(storeProfile, suppliers, [...stock, {id:Date.now(), name:f.get('n'), supplier:f.get('s'), qty:0, rate:parseInt(f.get('r')), totalOrdered:parseInt(f.get('o'))}], ledger, stockHistory, customers, customerLedger, capitalAccounts, capitalLedger, cashLedger); setModal(null); }}>
                    <h3>نیا آئٹم</h3><input name="n" placeholder="نام" required /><input name="s" placeholder="سپلائر" required /><input name="o" type="number" placeholder="آرڈر مقدار" required /><input name="r" type="number" placeholder="ریٹ" required /><button className="btn btn-blue" style={{width:'100%'}}>محفوظ</button></form>
                )}
                
                {modal.type === 'addSup' && (<div><h3>نیا سپلائر</h3><input id="supName" placeholder="نام" /><button className="btn btn-blue" style={{width:'100%'}} onClick={()=>{ sync(storeProfile, [...suppliers, {id:Date.now(), name:document.getElementById('supName').value}], stock, ledger, stockHistory, customers, customerLedger, capitalAccounts, capitalLedger, cashLedger); setModal(null); }}>محفوظ</button></div>)}
                {modal.type === 'addCust' && (<div><h3>نیا کسٹمر</h3><input id="custName" placeholder="نام" /><button className="btn btn-blue" style={{width:'100%'}} onClick={()=>{ sync(storeProfile, suppliers, stock, ledger, stockHistory, [...customers, {id:Date.now(), name:document.getElementById('custName').value}], customerLedger, capitalAccounts, capitalLedger, cashLedger); setModal(null); }}>محفوظ</button></div>)}
                {modal.type === 'addCapAccount' && (
                  <form onSubmit={(e)=>{ e.preventDefault(); sync(storeProfile, suppliers, stock, ledger, stockHistory, customers, customerLedger, [...capitalAccounts, {id:Date.now(), name:e.target.n.value}], capitalLedger, cashLedger); setModal(null); }}>
                    <h3>نیا سرمایہ اکاؤنٹ</h3><input name="n" placeholder="اکاؤنٹ کا نام" required /><button className="btn btn-purple" style={{width:'100%'}}>محفوظ</button></form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
