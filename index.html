<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نیو قاری ہوزری - فائنل فکس</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    body { margin: 0; background: #f4f7f6; font-family: system-ui; direction: rtl; }
    .header { background: #2c3e50; color: white; padding: 12px; text-align: center; }
    .tab-bar { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; font-size: 15px; }
    .active-tab { border-bottom: 4px solid #3498db; color: #3498db; }
    .container { padding: 10px; max-width: 600px; margin: auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 2px; }
    .btn-blue { background: #3498db; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e74c3c; color: white; }
    .btn-orange { background: #f39c12; color: white; }
    .btn-gray { background: #95a5a6; color: white; }
    input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-top: 8px; box-sizing: border-box; font-size: 14px; }
    .total-banner { background: #2ecc71; color: white; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 10px; font-weight: bold; }
    table { width: 100%; text-align: right; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:1000; padding:10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = { apiKey: "AIzaSyCb7MQuMjkDuDGc0PXFK07xb8eN1_srbGU", authDomain: "farman-93e1d.firebaseapp.com", projectId: "farman-93e1d", storageBucket: "farman-93e1d.firebasestorage.app", messagingSenderId: "838060218283", appId: "1:838060218283:web:92df7394c10ea4212264ee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storeRef = db.collection('khataApp').doc('qaariHosieryData');

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('stock');
      const [suppliers, setSuppliers] = useState([]);
      const [stock, setStock] = useState([]);
      const [ledger, setLedger] = useState([]);
      const [viewingSup, setViewingSup] = useState(null);
      const [modal, setModal] = useState(null);

      useEffect(() => {
        firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          if(u) {
            storeRef.get().then(doc => {
              if (doc.exists) {
                const d = doc.data();
                setSuppliers(d.suppliers || []);
                setStock(d.stock || []);
                setLedger(d.ledger || []);
              }
            });
          }
        });
      }, []);

      const sync = (newS, newSt, newL) => {
        setSuppliers(newS); setStock(newSt); setLedger(newL);
        storeRef.set({ suppliers: newS, stock: newSt, ledger: newL });
      };

      const totalValue = stock.reduce((acc, s) => acc + (s.qty * (s.rate || 0)), 0);

      const handleStock = (id, type) => {
        const item = stock.find(s => s.id === id);
        const qty = prompt(type === 'in' ? `${item.name} کتنا آیا؟` : `${item.name} کتنا بیچا؟`);
        if(!qty || isNaN(qty)) return;
        const amt = parseInt(qty);

        if(type === 'in') {
          const rate = prompt("ریٹ درج کریں:", item.rate || "");
          if(rate) {
            const bill = amt * parseInt(rate);
            let targetSup = suppliers.find(x => x.name === item.supplier);
            const entry = { id: Date.now(), supplierId: targetSup ? targetSup.id : 0, date: new Date().toISOString().split('T')[0], type: 'bill', amount: bill, note: `اسٹاک ان: ${item.name} (${amt} درجن)` };
            sync(suppliers, stock.map(s => s.id === id ? {...s, qty: s.qty + amt, rate: parseInt(rate)} : s), [entry, ...ledger]);
          }
        } else {
          if(item.qty < amt) { alert("اسٹاک کم ہے!"); return; }
          sync(suppliers, stock.map(s => s.id === id ? {...s, qty: s.qty - amt} : s), ledger);
        }
      };

      if (!user) return <div style={{textAlign:'center', padding:'50px'}}><button className="btn btn-blue" onClick={()=>firebase.auth().signInAnonymously()}>سسٹم کھولیں</button></div>;

      return (
        <div>
          <div className="header"><h2>نیو قاری ہوزری</h2></div>
          {!viewingSup ? (
            <>
              <div className="tab-bar">
                <button className={`tab-btn ${activeTab==='stock'?'active-tab':''}`} onClick={()=>setActiveTab('stock')}>اسٹاک</button>
                <button className={`tab-btn ${activeTab==='ledger'?'active-tab':''}`} onClick={()=>setActiveTab('ledger')}>کھاتہ</button>
              </div>
              <div className="container">
                {activeTab === 'stock' && (
                  <div>
                    <div className="total-banner">گودام مالیت: {totalValue.toLocaleString()} Rs</div>
                    <div className="card">
                      <table>
                        <thead><tr><th>آئٹم/سپلائر</th><th>موجود</th><th>ایکشن</th></tr></thead>
                        <tbody>
                          {stock.map(s => (
                            <tr key={s.id}>
                              <td><strong>{s.name}</strong><br/><small>{s.supplier}</small></td>
                              <td>{s.qty}<br/><small>{s.rate} Rs</small></td>
                              <td>
                                <button className="btn btn-green" onClick={()=>handleStock(s.id, 'in')}>+</button>
                                <button className="btn btn-orange" onClick={()=>handleStock(s.id, 'out')}>-</button>
                                <button className="btn btn-orange" style={{padding:'4px'}} onClick={()=>setModal({type:'editStock', data:s})}>✎</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      <button className="btn btn-blue" style={{width:'100%', marginTop:'15px'}} onClick={()=>setModal({type:'addStock'})}>+ نیا آئٹم شامل کریں</button>
                    </div>
                  </div>
                )}
                {activeTab === 'ledger' && (
                  <div>
                    <button className="btn btn-blue" style={{width:'100%', padding:'12px', marginBottom:'10px'}} onClick={()=>setModal({type:'addSup'})}>+ نیا سپلائر شامل کریں</button>
                    {suppliers.map(s => {
                      const bal = ledger.filter(l => l.supplierId === s.id).reduce((a,c) => c.type === 'bill' ? a + c.amount : a - c.amount, 0);
                      return (
                        <div className="card" key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                          <div onClick={()=>setViewingSup(s)} style={{cursor:'pointer', flex:1}}>
                            <strong>{s.name}</strong>
                            <div style={{color: bal > 0 ? 'red' : 'green', fontWeight:'bold'}}>بقایا: {bal.toLocaleString()} Rs</div>
                          </div>
                          <button className="btn btn-red" onClick={() => { if(confirm('ڈیلیٹ؟')) sync(suppliers.filter(x=>x.id!==s.id), stock, ledger.filter(x=>x.supplierId!==s.id)) }}>🗑</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </>
          ) : (
            <div className="container">
              <button className="btn btn-gray" onClick={()=>setViewingSup(null)}>← واپس</button>
              <div className="card" style={{marginTop:'10px'}}>
                <h3>{viewingSup.name} کا کھاتہ</h3>
                <div style={{display:'flex', gap:'5px'}}>
                  <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'bill'})}>+ بل انٹری</button>
                  <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'payment'})}>+ ادائیگی</button>
                </div>
              </div>
              <div className="card">
                <table>
                  <thead><tr><th>تاریخ</th><th>تفصیل</th><th>بل</th><th>ادا</th></tr></thead>
                  <tbody>
                    {ledger.filter(l => l.supplierId === viewingSup.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => (
                      <tr key={l.id}>
                        <td>{l.date}</td>
                        <td style={{fontSize:'12px'}}>{l.note}</td>
                        <td style={{color:'red'}}>{l.type==='bill'?l.amount:'-'}</td>
                        <td style={{color:'green'}}>{l.type==='payment'?l.amount:'-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {modal && (
            <div className="modal">
              <div className="card" style={{width:'90%', maxWidth:'400px'}}>
                {modal.type === 'addSup' && (
                  <div>
                    <h3>نیا سپلائر شامل کریں</h3>
                    <input id="supNameIn" placeholder="سپلائر کا نام..." />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}} onClick={()=>{
                      const n = document.getElementById('supNameIn').value;
                      if(n) { sync([...suppliers, {id: Date.now(), name: n}], stock, ledger); setModal(null); }
                    }}>محفوظ کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setModal(null)}>کینسل</button>
                  </div>
                )}
                {modal.type === 'addStock' && (
                  <form onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    const sName = f.get('s');
                    const nId = Date.now();
                    let nSups = [...suppliers];
                    if(!suppliers.find(x=>x.name === sName)) nSups.push({id: nId+1, name: sName});
                    sync(nSups, [...stock, {id: nId, name: f.get('n'), supplier: sName, qty: 0, rate: parseInt(f.get('r')), totalOrdered: parseInt(f.get('o'))}], ledger);
                    setModal(null);
                  }}>
                    <h3>نیا آئٹم</h3>
                    <input name="n" placeholder="آئٹم کا نام" required />
                    <input name="s" list="supList" placeholder="سپلائر کا نام" required />
                    <datalist id="supList">{suppliers.map(s=><option key={s.id} value={s.name}/>)}</datalist>
                    <input name="o" type="number" placeholder="ٹوٹل آرڈر" required />
                    <input name="r" type="number" placeholder="ریٹ" required />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>سیو</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
                {modal.type === 'addEntry' && (
                  <form onSubmit={(e)=>{
                    e.preventDefault();
                    const f = new FormData(e.target);
                    sync(suppliers, stock, [{id: Date.now(), supplierId: viewingSup.id, date: f.get('d'), type: modal.entryType, amount: parseInt(f.get('a')), note: f.get('n')}, ...ledger]);
                    setModal(null);
                  }}>
                    <h3>{modal.entryType==='bill'?'بل انٹری':'ادائیگی'}</h3>
                    <input type="date" name="d" defaultValue={new Date().toISOString().split('T')[0]} />
                    <input type="number" name="a" placeholder="رقم" required />
                    <input name="n" placeholder="تفصیل" />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}}>سیو کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
