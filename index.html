<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نیو قاری ہوزری - پروفیشنل لیجر</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <style>
    body { margin: 0; background: #f0f2f5; font-family: system-ui; direction: rtl; }
    .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
    .tab-bar { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; }
    .active-tab { border-bottom: 4px solid #3498db; color: #3498db; }
    .container { padding: 10px; max-width: 600px; margin: auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin: 2px; }
    .btn-blue { background: #3498db; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e74c3c; color: white; }
    .btn-orange { background: #f39c12; color: white; }
    .btn-gray { background: #95a5a6; color: white; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; margin-top: 5px; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:1000; padding:10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
    .total-box { display: flex; justify-content: space-between; font-weight: bold; padding: 10px; background: #eef; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = { apiKey: "AIzaSyCb7MQuMjkDuDGc0PXFK07xb8eN1_srbGU", authDomain: "farman-93e1d.firebaseapp.com", projectId: "farman-93e1d", storageBucket: "farman-93e1d.firebasestorage.app", messagingSenderId: "838060218283", appId: "1:838060218283:web:92df7394c10ea4212264ee" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storeRef = db.collection('khataApp').doc('qaariHosieryData');

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('stock');
      const [suppliers, setSuppliers] = useState([]);
      const [stock, setStock] = useState([]);
      const [ledger, setLedger] = useState([]);
      const [viewingSupplier, setViewingSupplier] = useState(null);
      const [modal, setModal] = useState(null);

      useEffect(() => {
        firebase.auth().onAuthStateChanged(u => {
          setUser(u);
          if(u) {
            storeRef.get().then(doc => {
              if (doc.exists) {
                const d = doc.data();
                setSuppliers(d.suppliers || []);
                setStock(d.stock || []);
                setLedger(d.ledger || []);
              }
            });
          }
        });
      }, []);

      const saveData = (newS, newSt, newL) => {
        setSuppliers(newS); setStock(newSt); setLedger(newL);
        storeRef.set({ suppliers: newS, stock: newSt, ledger: newL });
      };

      // --- Supplier Logic ---
      const addSupplier = (name) => {
        if(!name) return;
        const newS = [...suppliers, { id: Date.now(), name }];
        saveData(newS, stock, ledger);
        setModal(null);
      };

      const deleteSupplier = (id) => {
        if(!confirm("کیا آپ واقعی اس سپلائر اور اس کا تمام ریکارڈ ختم کرنا چاہتے ہیں؟")) return;
        const name = suppliers.find(s => s.id === id).name;
        saveData(suppliers.filter(s => s.id !== id), stock, ledger.filter(l => l.supplierId !== id));
      };

      const editSupplier = (id, newName) => {
        saveData(suppliers.map(s => s.id === id ? {...s, name: newName} : s), stock, ledger);
        setModal(null);
      };

      // --- Ledger Logic ---
      const addLedgerEntry = (e) => {
        e.preventDefault();
        const f = new FormData(e.target);
        const newEntry = {
          id: Date.now(),
          supplierId: viewingSupplier.id,
          date: f.get('date'),
          type: f.get('type'), // 'bill' or 'payment'
          amount: parseInt(f.get('amount')),
          note: f.get('note')
        };
        saveData(suppliers, stock, [newEntry, ...ledger]);
        setModal(null);
      };

      const deleteEntry = (id) => {
        if(confirm("ڈیلیٹ کریں؟")) saveData(suppliers, stock, ledger.filter(l => l.id !== id));
      };

      const updateEntry = (e) => {
        e.preventDefault();
        const f = new FormData(e.target);
        const id = parseInt(f.get('id'));
        saveData(suppliers, stock, ledger.map(l => l.id === id ? {
          ...l, date: f.get('date'), type: f.get('type'), amount: parseInt(f.get('amount')), note: f.get('note')
        } : l));
        setModal(null);
      };

      if (!user) return <div style={{textAlign:'center', padding:'50px'}}><button className="btn btn-blue" onClick={()=>firebase.auth().signInAnonymously()}>سسٹم کھولیں</button></div>;

      return (
        <div>
          <div className="header"><h2>نیو قاری ہوزری</h2></div>
          
          {!viewingSupplier ? (
            <>
              <div className="tab-bar">
                <button className={`tab-btn ${activeTab==='stock'?'active-tab':''}`} onClick={()=>setActiveTab('stock')}>اسٹاک</button>
                <button className={`tab-btn ${activeTab==='ledger'?'active-tab':''}`} onClick={()=>setActiveTab('ledger')}>کھاتہ</button>
              </div>

              <div className="container">
                {activeTab === 'ledger' && (
                  <div>
                    <button className="btn btn-blue" style={{width:'100%', padding:'12px', marginBottom:'10px'}} onClick={()=>setModal({type:'addSup'})}>+ نیا سپلائر شامل کریں</button>
                    {suppliers.map(s => {
                      const sLedger = ledger.filter(l => l.supplierId === s.id);
                      const balance = sLedger.reduce((acc, curr) => curr.type === 'bill' ? acc + curr.amount : acc - curr.amount, 0);
                      return (
                        <div className="card" key={s.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                          <div onClick={()=>setViewingSupplier(s)} style={{cursor:'pointer', flex:1}}>
                            <strong>{s.name}</strong>
                            <div style={{color: balance > 0 ? 'red' : 'green', fontSize:'13px'}}>بقایا: {Math.abs(balance)} Rs</div>
                          </div>
                          <div>
                            <button className="btn btn-orange" onClick={()=>setModal({type:'editSup', data: s})}>✎</button>
                            <button className="btn btn-red" onClick={()=>deleteSupplier(s.id)}>🗑</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {activeTab === 'stock' && <div className="card">اسٹاک مینیجمنٹ (پچھلے کوڈ والا یہاں کام کرے گا)</div>}
              </div>
            </>
          ) : (
            <div className="container">
              <button className="btn btn-gray" onClick={()=>setViewingSupplier(null)}>← واپس سپلائر لسٹ</button>
              <div className="card" style={{marginTop:'10px', background:'#f9f9f9'}}>
                <h3 style={{margin:0}}>{viewingSupplier.name} کا کھاتہ</h3>
                <div style={{display:'flex', gap:'5px', marginTop:'10px'}}>
                  <button className="btn btn-red" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'bill'})}>+ بل وصولی</button>
                  <button className="btn btn-green" style={{flex:1}} onClick={()=>setModal({type:'addEntry', entryType:'payment'})}>+ پیمنٹ ادائیگی</button>
                </div>
              </div>

              <div className="card">
                <table>
                  <thead><tr><th>تاریخ</th><th>تفصیل</th><th>بل (+)</th><th>ادائیگی (-)</th><th>عمل</th></tr></thead>
                  <tbody>
                    {ledger.filter(l => l.supplierId === viewingSupplier.id).sort((a,b)=> new Date(b.date) - new Date(a.date)).map(l => (
                      <tr key={l.id}>
                        <td>{l.date}</td>
                        <td>{l.note || (l.type==='bill'?'بل':'پیمنٹ')}</td>
                        <td style={{color:'red'}}>{l.type==='bill' ? l.amount : '-'}</td>
                        <td style={{color:'green'}}>{l.type==='payment' ? l.amount : '-'}</td>
                        <td>
                           <button className="btn btn-orange" style={{padding:'2px 5px'}} onClick={()=>setModal({type:'editEntry', data: l})}>✎</button>
                           <button className="btn btn-red" style={{padding:'2px 5px'}} onClick={()=>deleteEntry(l.id)}>×</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Modals */}
          {modal && (
            <div className="modal">
              <div className="card" style={{width:'90%', maxWidth:'400px'}}>
                {modal.type === 'addSup' && (
                  <div>
                    <h3>نیا سپلائر</h3>
                    <input id="supName" placeholder="سپلائر کا نام لکھیں..." />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}} onClick={()=>addSupplier(document.getElementById('supName').value)}>محفوظ کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setModal(null)}>کینسل</button>
                  </div>
                )}
                {modal.type === 'editSup' && (
                  <div>
                    <h3>نام تبدیل کریں</h3>
                    <input id="newSupName" defaultValue={modal.data.name} />
                    <button className="btn btn-blue" style={{width:'100%', marginTop:'10px'}} onClick={()=>editSupplier(modal.data.id, document.getElementById('newSupName').value)}>اپ ڈیٹ کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} onClick={()=>setModal(null)}>کینسل</button>
                  </div>
                )}
                {(modal.type === 'addEntry' || modal.type === 'editEntry') && (
                  <form onSubmit={modal.type === 'addEntry' ? addLedgerEntry : updateEntry}>
                    <h3>{modal.type === 'addEntry' ? (modal.entryType === 'bill' ? 'نیا بل' : 'نئی پیمنٹ') : 'انٹری درست کریں'}</h3>
                    {modal.type === 'editEntry' && <input type="hidden" name="id" value={modal.data.id} />}
                    <label>تاریخ منتخب کریں:</label>
                    <input type="date" name="date" defaultValue={modal.type === 'editEntry' ? modal.data.date : new Date().toISOString().split('T')[0]} required />
                    <label>رقم:</label>
                    <input type="number" name="amount" defaultValue={modal.type === 'editEntry' ? modal.data.amount : ''} placeholder="رقم لکھیں..." required />
                    <label>تفصیل (اختیاری):</label>
                    <input type="text" name="note" defaultValue={modal.type === 'editEntry' ? modal.data.note : ''} placeholder="کوئی نوٹ لکھیں..." />
                    <input type="hidden" name="type" value={modal.type === 'editEntry' ? modal.data.type : modal.entryType} />
                    <button className="btn btn-green" style={{width:'100%', marginTop:'15px'}} type="submit">سیو کریں</button>
                    <button className="btn btn-gray" style={{width:'100%'}} type="button" onClick={()=>setModal(null)}>کینسل</button>
                  </form>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
