<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نیو قاری ہوزری سٹور - پرو</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; boxShadow: 0 4px 6px rgba(0,0,0,0.05); }
    .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 2px; }
    .btn-blue { background: #1a73e8; color: white; }
    .btn-green { background: #28a745; color: white; }
    .btn-red { background: #dc3545; color: white; }
    .btn-orange { background: #fd7e14; color: white; }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
    .flex-row { display: flex; gap: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCb7MQuMjkDuDGc0PXFK07xb8eN1_srbGU",
      authDomain: "farman-93e1d.firebaseapp.com",
      projectId: "farman-93e1d",
      storageBucket: "farman-93e1d.firebasestorage.app",
      messagingSenderId: "838060218283",
      appId: "1:838060218283:web:92df7394c10ea4212264ee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storeDataRef = db.collection('khataApp').doc('qaariHosieryData');

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('orders');
      const [dataLoaded, setDataLoaded] = useState(false);

      // Data States
      const [suppliers, setSuppliers] = useState([]);
      const [orders, setOrders] = useState([]);
      const [stock, setStock] = useState([]);
      const [editingId, setEditingId] = useState(null);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(currentUser => {
          setUser(currentUser);
          if(currentUser) {
            storeDataRef.get().then((doc) => {
              if (doc.exists) {
                const data = doc.data();
                setSuppliers(data.suppliers || []);
                setOrders(data.orders || []);
                setStock(data.stock || []);
              }
              setDataLoaded(true);
            });
          }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if(dataLoaded && user) {
          storeDataRef.set({ suppliers, orders, stock });
        }
      }, [suppliers, orders, stock]);

      // --- PDF Generator ---
      const downloadPDF = (type, supName = "") => {
        const doc = new jspdf.jsPDF();
        doc.setFontSize(20);
        doc.text("New Qaari Hosiery Store", 105, 15, { align: "center" });
        doc.setFontSize(12);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 22, { align: "center" });

        if (type === 'ledger' && supName) {
          doc.text(`Ledger Report: ${supName}`, 15, 30);
          const sup = suppliers.find(s => s.name === supName);
          const data = [
            ["Total Billed", `${sup.totalBilled} Rs`],
            ["Total Paid", `${sup.totalPaid} Rs`],
            ["Balance", `${sup.totalBilled - sup.totalPaid} Rs`]
          ];
          doc.autoTable({ startY: 35, head: [['Description', 'Amount']], body: data });
        } else if (type === 'stock') {
          doc.text("Current Stock Report", 15, 30);
          const data = stock.map(s => [s.name, s.qty]);
          doc.autoTable({ startY: 35, head: [['Item Name', 'Quantity (Doz)']], body: data });
        }

        doc.save(`${type}_report.pdf`);
        alert("پی ڈی ایف تیار ہے! اب آپ اسے واٹس ایپ پر شیئر کر سکتے ہیں۔");
      };

      // --- Functions ---
      const handlePlaceOrder = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const orderData = {
          id: editingId || Date.now(),
          date: fd.get('date'),
          supplier: fd.get('supplier'),
          item: fd.get('item'),
          orderedQty: parseInt(fd.get('qty')),
          rate: parseInt(fd.get('rate')),
          receivedQty: 0
        };

        if(editingId) {
            setOrders(orders.map(o => o.id === editingId ? {...orderData, receivedQty: o.receivedQty} : o));
            setEditingId(null);
        } else {
            setOrders([orderData, ...orders]);
            if (!suppliers.find(s => s.name === orderData.supplier)) {
                setSuppliers([...suppliers, { name: orderData.supplier, totalBilled: 0, totalPaid: 0 }]);
            }
        }
        e.target.reset();
      };

      if (!user) return (
        <div style={{ textAlign: 'center', marginTop: '100px' }}>
          <h1>نیو قاری ہوزری سٹور</h1>
          <button className="btn btn-green" onClick={() => auth.signInAnonymously()}>کھاتہ کھولیں</button>
        </div>
      );

      return (
        <div style={{ maxWidth: '600px', margin: 'auto', padding: '10px' }}>
          <div style={{ background: '#2c3e50', color: 'white', padding: '15px', textAlign: 'center', borderRadius: '0 0 15px 15px' }}>
            <h2 style={{margin:0}}>نیو قاری ہوزری سٹور</h2>
            <div style={{fontSize: '12px', opacity: 0.8}}>کلاؤڈ بیک اپ ایکٹو ✓</div>
          </div>

          <div className="flex-row" style={{ marginTop: '10px' }}>
            <button style={{flex:1}} className={`btn ${activeTab==='orders'?'btn-blue':'btn-gray'}`} onClick={()=>setActiveTab('orders')}>آرڈر</button>
            <button style={{flex:1}} className={`btn ${activeTab==='ledger'?'btn-blue':'btn-gray'}`} onClick={()=>setActiveTab('ledger')}>کھاتہ</button>
            <button style={{flex:1}} className={`btn ${activeTab==='stock'?'btn-blue':'btn-gray'}`} onClick={()=>setActiveTab('stock')}>اسٹاک</button>
          </div>

          {activeTab === 'orders' && (
            <div>
              <div className="card">
                <h3>{editingId ? 'آرڈر ایڈٹ کریں' : 'نیا آرڈر درج کریں'}</h3>
                <form onSubmit={handlePlaceOrder}>
                  <input name="date" type="date" required defaultValue={new Date().toISOString().split('T')[0]} />
                  <input name="supplier" placeholder="سپلائر کا نام" required />
                  <input name="item" placeholder="آئٹم (بنیان، موزے وغیرہ)" required />
                  <div className="flex-row">
                    <input name="qty" type="number" placeholder="مقدار" required />
                    <input name="rate" type="number" placeholder="ریٹ" required />
                  </div>
                  <button className="btn btn-green" type="submit">{editingId ? 'تبدیلی محفوظ کریں' : 'آرڈر سیو کریں'}</button>
                </form>
              </div>

              {orders.map(o => (
                <div className="card" key={o.id}>
                  <div style={{display:'flex', justifyContent:'space-between'}}>
                    <strong>{o.supplier} - {o.item}</strong>
                    <small>{o.date}</small>
                  </div>
                  <p>آرڈر: {o.orderedQty} | ریٹ: {o.rate} | موصول: {o.receivedQty}</p>
                  <button className="btn btn-orange" onClick={() => setEditingId(o.id)}>ایڈٹ</button>
                  <button className="btn btn-red" onClick={() => setOrders(orders.filter(x => x.id !== o.id))}>حذف</button>
                </div>
              ))}
            </div>
          )}

          {activeTab === 'ledger' && (
            <div>
              <button className="btn btn-blue" onClick={() => downloadPDF('ledger_all')}>پورے کھاتے کی PDF</button>
              {suppliers.map((s, i) => (
                <div className="card" key={i}>
                  <h4>{s.name}</h4>
                  <p>بل: {s.totalBilled} | ادا: {s.totalPaid}</p>
                  <p><strong>بقایا: {s.totalBilled - s.totalPaid} Rs</strong></p>
                  <button className="btn btn-green" onClick={() => downloadPDF('ledger', s.name)}>اس کا بل بنائیں</button>
                </div>
              ))}
            </div>
          )}

          {activeTab === 'stock' && (
            <div className="card">
              <h3>موجودہ اسٹاک</h3>
              <button className="btn btn-blue" onClick={() => downloadPDF('stock')}>اسٹاک لسٹ PDF</button>
              <table style={{width:'100%', marginTop:'10px', textAlign:'right'}}>
                <thead><tr><th>آئٹم</th><th>مقدار</th></tr></thead>
                <tbody>
                  {stock.map((st, i) => (
                    <tr key={i}><td>{st.name}</td><td>{st.qty} Doz</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
